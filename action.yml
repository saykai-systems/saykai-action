name: Saykai Safety Gate
description: Run Saykai safety checks in CI and block on violations
author: Saykai

# Add branding to look professional in the Marketplace
branding:
  icon: 'shield'
  color: 'green'

inputs:
  # renamed to kebab-case to match README
  runner-repo:
    description: Repo that hosts the runner release assets (owner/name)
    required: false
    default: saykai-systems/runner
  runner-version:
    description: Runner release tag (e.g., v0.1.0) or 'latest'
    required: false
    default: latest
  runner-base-url:
    description: Optional override download base (e.g., https://downloads.saykai.com/runner)
    required: false
   
  # Crucial: Matches "with: github-token" in README
  github-token: 
    description: GitHub token with read access to runner repo releases
    required: true
    
  # Crucial: Matches "with: spec-path" in README
  spec-path:
    description: Path to saykai.yml
    required: false
    default: saykai.yml
    
  out-path:
    description: Output Safety Pack path
    required: false
    default: safety_pack.json

  # Added to match README "Configuration" table
  fail-on-error:
    description: If true, the CI job fails if the Saykai engine encounters an internal error (Fail Closed).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Run Saykai
      shell: bash
      env:
        # Maps the input to the ENV var your script expects
        SAYKAI_RUNNER_TOKEN: ${{ inputs.github-token }}
        # Pass fail-on-error as an ENV var
        SAYKAI_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        # Temporarily disable immediate exit (set +e) to capture the script's return code
        set +e
        bash "${{ github.action_path }}/scripts/run.sh" \
          "${{ inputs.runner-repo }}" \
          "${{ inputs.runner-version }}" \
          "${{ inputs.runner-base_url }}" \
          "${{ inputs.spec-path }}" \
          "${{ inputs.out-path }}"
        EXIT_CODE=$?
        set -e

        # Check exit code against the fail-on-error policy
        if [ $EXIT_CODE -ne 0 ]; then
          if [ "${SAYKAI_FAIL_ON_ERROR}" == "true" ]; then
            echo "::error::Saykai Safety Gate failed (Exit Code: $EXIT_CODE)."
            exit $EXIT_CODE
          else
            echo "::warning::Saykai Safety Gate failed (Exit Code: $EXIT_CODE), but fail-on-error is false. CI proceeding."
            exit 0
          fi
        fi
