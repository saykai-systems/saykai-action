name: Saykai Safety Gate
description: Audit Nav2/ROS2 robot configs in CI and block on safety violations
author: Saykai

# Add branding to look professional in the Marketplace
branding:
  icon: 'shield'
  color: 'green'

inputs:
  runner-repo:
    description: Repo that hosts the runner release assets (owner/name). This is a dedicated, source-free release-hosting repo, not the runner's own source repo.
    required: false
    default: saykai-systems/saykai-releases
  runner-version:
    description: Runner release tag (e.g., v1.0.1) or 'latest'
    required: false
    default: latest
  runner-base-url:
    description: Optional override download base (e.g., https://downloads.saykai.com/runner)
    required: false

  # Crucial: Matches "with: github-token" in README
  github-token:
    description: Token with read access to the runner-repo release assets. Scope this to runner-repo only -- it should never have access to Saykai's source repo.
    required: true

  # Crucial: Matches "with: spec-path" in README
  spec-path:
    description: Path to saykai.yml
    required: false
    default: saykai.yml

  # Added to match README "Configuration" table
  fail-on-error:
    description: If true, the CI job fails if the Saykai engine encounters an internal error (Fail Closed).
    required: false
    default: 'true'

  repo-token:
    description: >-
      Optional. A token with pull-requests:write on YOUR OWN repo (not
      runner-repo) -- typically your workflow's own default, auto-generated
      per-run GITHUB_TOKEN secret, already scoped to your repo. When set,
      posts/updates a single PR comment summarizing the run. Requires your
      workflow to grant pull-requests:write permission. Left unset by
      default: no comment is posted, and the gate behaves exactly as before.
    required: false
    default: ''

runs:
  using: composite
  steps:
    # This step always exits 0 -- the real pass/fail decision is made in
    # "Enforce fail-on-error policy" below, AFTER the artifact upload runs.
    # Doing it this way (rather than exiting non-zero here directly) means a
    # BLOCK verdict can't skip the artifact upload, since a failed step
    # would otherwise stop the rest of the composite action's steps.
    - name: Run Saykai
      id: run
      shell: bash
      env:
        SAYKAI_RUNNER_TOKEN: ${{ inputs.github-token }}
      run: |
        set +e
        bash "${{ github.action_path }}/scripts/run.sh" \
          "${{ inputs.runner-repo }}" \
          "${{ inputs.runner-version }}" \
          "${{ inputs.runner-base-url }}" \
          "${{ inputs.spec-path }}" \
          "${{ inputs.repo-token }}"
        EXIT_CODE=$?
        set -e
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit 0

    # Uploads the signed safety pack regardless of pass/fail -- this is the
    # actual portable evidence artifact (audit/governance), not just a CI
    # convenience. continue-on-error: true because an upload failure (e.g. a
    # transient network issue) is a reporting problem, not a safety one --
    # it must never be able to affect the gate's real verdict below.
    - name: Upload Saykai safety pack
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: saykai-safety-pack
        path: safety_pack.json
        if-no-files-found: warn
        retention-days: 90

    - name: Enforce fail-on-error policy
      shell: bash
      env:
        SAYKAI_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
      run: |
        if [ "${EXIT_CODE:-0}" -ne 0 ]; then
          if [ "${SAYKAI_FAIL_ON_ERROR}" == "true" ]; then
            echo "::error::Saykai Safety Gate failed (Exit Code: $EXIT_CODE)."
            exit "$EXIT_CODE"
          else
            echo "::warning::Saykai Safety Gate failed (Exit Code: $EXIT_CODE), but fail-on-error is false. CI proceeding."
            exit 0
          fi
        fi
